# ============================================================================
# HOSTELWISE AI - GitHub Actions Continuous Integration (CI)
# ============================================================================

name: HostelWise AI CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up Python environment
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Verify syntax compilation across all files
    - name: Verify Code Compilation
      run: |
        python -m py_compile backend/main.py backend/services/*.py forecasting/*.py ai/*.py analytics/*.py

    # 5. Run the automated unit test suite
    - name: Run Unit Tests
      run: |
        python -m unittest discover -s tests
